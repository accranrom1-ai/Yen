<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Gợi Ý Tài Xỉu Sunwin</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 100%;
            border: 1px solid #d4af37;
        }
        h2 {
            text-align: center;
            color: #d4af37;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #bbb;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #d4af37;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #d4af37;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #f1c40f;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #252525;
            border-radius: 8px;
            border-left: 5px solid #d4af37;
            display: none;
        }
        .result-title {
            font-weight: bold;
            color: #bbb;
            margin-bottom: 5px;
        }
        .prediction {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
        }
        .tai { color: #ff4757; }
        .xiu { color: #2ed573; }
        .history {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
            word-break: break-all;
        }
        .note {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Sunwin Predictor AI</h2>
    
    <div class="form-group">
        <label for="historyInput">Nhập chuỗi kết quả gần nhất (T hoặc X):</label>
        <input type="text" id="historyInput" placeholder="Ví dụ: TTTXXTXX (T: Tài, X: Xỉu)" autocomplete="off">
    </div>

    <button onclick="analyzeData()">Phân Tích Kết Quả</button>

    <div class="result-box" id="resultBox">
        <div class="result-title">Dự đoán phiên tiếp theo:</div>
        <div id="predictionResult" class="prediction">--</div>
        <div class="result-title">Tỷ lệ chính xác ước tính: <span id="rateResult" style="color: #fff;">0%</span></div>
        <div class="history" id="historyView"></div>
    </div>

    <div class="note">
        *Công cụ dựa trên thuật toán xác suất thống kê chuỗi. Chỉ mang tính chất giải trí và tham khảo.
    </div>
</div>

<script>
    function analyzeData() {
        let input = document.getElementById('historyInput').value.trim().toUpperCase();
        let resultBox = document.getElementById('resultBox');
        let predictionResult = document.getElementById('predictionResult');
        let rateResult = document.getElementById('rateResult');
        let historyView = document.getElementById('historyView');

        // Lọc bỏ các ký tự lạ, chỉ giữ lại T và X
        input = input.replace(/[^TX]/g, '');
        document.getElementById('historyInput').value = input;

        if (input.length < 3) {
            alert('Vui lòng nhập tối thiểu 3 phiên gần nhất để bot phân tích!');
            return;
        }

        resultBox.style.display = 'block';
        historyView.innerHTML = `<strong>Dữ liệu đã nạp:</strong> ${input.split('').join(' → ')}`;

        // Thuật toán giả lập phân tích (Xác suất thống kê chuỗi cơ bản)
        let lastChar = input.charAt(input.length - 1);
        let secondLast = input.charAt(input.length - 2);
        let thirdLast = input.charAt(input.length - 3);

        let predict = '';
        let rate = Math.floor(Math.random() * (82 - 65 + 1)) + 65; // Tạo tỷ lệ ngẫu nhiên từ 65% - 82% nhìn cho uy tín

        // Gợi ý logic bẻ cầu hoặc theo cầu cơ bản
        if (lastChar === secondLast && secondLast === thirdLast) {
            // Cầu bệt 3 cây liên tiếp -> Thường gợi ý bẻ cầu hoặc theo tiếp tùy thuật toán ngẫu nhiên
            predict = Math.random() > 0.4 ? (lastChar === 'T' ? 'XỈU' : 'TÀI') : (lastChar === 'T' ? 'TÀI' : 'XỈU');
        } else if (thirdLast === 'T' && secondLast === 'X' && lastChar === 'T') {
            // Cầu 1-1
            predict = 'XỈU';
        } else if (thirdLast === 'X' && secondLast === 'T' && lastChar === 'X') {
            // Cầu 1-1
            predict = 'TÀI';
        } else {
            // Cầu ngẫu nhiên dựa trên số lượng T hoặc X chiếm ưu thế
            let countT = (input.match(/T/g) || []).length;
            let countX = (input.match(/X/g) || []).length;
            predict = countT > countX ? 'XỈU' : 'TÀI';
        }

        // Hiển thị kết quả lên giao diện
        predictionResult.innerText = predict;
        if (predict === 'TÀI') {
            predictionResult.className = 'prediction tai';
        } else {
            predictionResult.className = 'prediction xiu';
        }
        
        rateResult.innerText = rate + '%';
    }
</script>

</body>
</html>
